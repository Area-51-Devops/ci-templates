name: Manual_CD

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
      ci-workflow-name:
        required: true
        type: string

    secrets:
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true
      MANIFEST_REPO:
        required: true
      CLUSTER_URL:
        required: true
      K8S_CA_CERT:
        required: true

jobs:
  update-manifest:
    name: "CD – Update Helm image tag"
    runs-on: self-hosted

    permissions:
      contents: read
      id-token: write

    steps:

      # ─────────────────────────────────────────────
      # 1. Checkout application repo
      # ─────────────────────────────────────────────
      - name: Checkout application repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─────────────────────────────────────────────
      # 2. Install required tools (LATEST VERSIONS)
      # ─────────────────────────────────────────────
      - name: Install CLI tools (kubectl, helm, yq, jq)
        run: |
          set -e

          echo "Installing jq..."
          sudo apt-get update -y
          sudo apt-get install -y jq curl git

          echo "Installing kubectl (latest stable)..."
          KUBECTL_VERSION=$(curl -L -s https://dl.k8s.io/release/stable.txt)
          curl -LO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

          echo "Installing helm (latest)..."
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

          echo "Installing yq (latest v4)..."
          YQ_VERSION=$(curl -s https://api.github.com/repos/mikefarah/yq/releases/latest | jq -r '.tag_name')
          wget "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" -O yq
          chmod +x yq
          sudo mv yq /usr/local/bin/

          echo "Versions:"
          kubectl version --client
          helm version
          yq --version
          jq --version

      # ─────────────────────────────────────────────
      # 3. Get latest git tag
      # ─────────────────────────────────────────────
      - name: Get latest git tag
        id: get_tag
        run: |
          git fetch --tags
          TAG=$(git describe --tags --abbrev=0)
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Resolved tag: ${TAG}"

      # ─────────────────────────────────────────────
      # 4. GitHub App Token
      # ─────────────────────────────────────────────
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: "k8s-manifests"

      # ─────────────────────────────────────────────
      # 5. Checkout manifest repo
      # ─────────────────────────────────────────────
      - name: Checkout manifest repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.MANIFEST_REPO }}
          token: ${{ steps.app-token.outputs.token }}
          path: manifest-repo

      # ─────────────────────────────────────────────
      # 6. Update Helm values.yaml
      # ─────────────────────────────────────────────
      - name: Update image tag in values.yaml
        run: |
          TAG=${{ steps.get_tag.outputs.tag }}
          FILE="manifest-repo/charts/${{ inputs.service-name }}/values.yaml"

          yq e ".image.tag = \"${TAG}\"" -i "$FILE"

          echo "Updated values.yaml:"
          cat "$FILE"

      # ─────────────────────────────────────────────
      # 7. Commit & push changes
      # ─────────────────────────────────────────────
      - name: Commit and push manifest changes
        run: |
          TAG=${{ steps.get_tag.outputs.tag }}

          cd manifest-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add charts/${{ inputs.service-name }}/values.yaml
          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "chore(${{ inputs.service-name }}): bump image tag to ${TAG}"
          git push

      # ─────────────────────────────────────────────
      # 8. Setup Kubernetes access
      # ─────────────────────────────────────────────
      - name: Configure kubectl
        run: |
          echo "${{ secrets.K8S_CA_CERT }}" | base64 -d > ca.crt

          kubectl config set-cluster k8s \
            --server=${{ secrets.CLUSTER_URL }} \
            --certificate-authority=ca.crt

          kubectl config set-credentials github \
            --token=$TOKEN

          kubectl config set-context prod \
            --cluster=k8s \
            --user=github \
            --namespace=backend

          kubectl config use-context prod

      # ─────────────────────────────────────────────
      # 9. Deploy Helm chart
      # ─────────────────────────────────────────────
      - name: Deploy Helm chart
        run: |
          helm upgrade --install ${{ inputs.service-name }} \
            manifest-repo/charts/${{ inputs.service-name }} \
            -n backend

      # ─────────────────────────────────────────────
      # 10. Verify rollout
      # ─────────────────────────────────────────────
      - name: Verify rollout
        run: |
          kubectl rollout status deployment/${{ inputs.service-name }} -n backend