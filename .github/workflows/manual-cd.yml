name: Manual_CD

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
      ci-workflow-name:
        required: true
        type: string

    secrets:
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true
      MANIFEST_REPO:
        required: true
      CLUSTER_URL:
        required: true
      K8S_CA_CERT:
        required: true

jobs:
  update-manifest:
    name: "CD - Update Helm image tag"
    runs-on: self-hosted

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout application repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest git tag
        id: get_tag
        run: |
          git fetch --tags
          TAG=$(git describe --tags --abbrev=0)
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Resolved tag: ${TAG}"

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: "k8s-manifests"

      - name: Checkout manifest repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.MANIFEST_REPO }}
          token: ${{ steps.app-token.outputs.token }}
          path: manifest-repo

      - name: Setup yq
        uses: mikefarah/yq@v4.44.3

      - name: Verify yq
        run: yq --version

      - name: Update image tag in values.yaml
        run: |
          TAG=${{ steps.get_tag.outputs.tag }}
          FILE="manifest-repo/charts/${{ inputs.service-name }}/values.yaml"

          yq e ".image.tag = \"${TAG}\"" -i "$FILE"

          cat "$FILE"

      - name: Commit and push manifest changes
        run: |
          TAG=${{ steps.get_tag.outputs.tag }}

          cd manifest-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add charts/${{ inputs.service-name }}/values.yaml
          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "chore(${{ inputs.service-name }}): bump image tag to ${TAG}"
          git push

      - name: Ensure jq is installed
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y jq
          fi

      - name: Verify jq
        run: jq --version

      - name: Get Kubernetes OIDC token
        id: oidc
        run: |
          TOKEN=$(curl -s \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=kubernetes" \
            | jq -r '.value')

          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "ERROR: OIDC token not generated"
            exit 1
          fi

          echo "TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Verify kubectl
        run: kubectl version --client

      - name: Configure kubectl
        run: |
          echo "${{ secrets.K8S_CA_CERT }}" | base64 -d > ca.crt

          kubectl config set-cluster k8s \
            --server=${{ secrets.CLUSTER_URL }} \
            --certificate-authority=ca.crt

          kubectl config set-credentials github \
            --token=${TOKEN}

          kubectl config set-context prod \
            --cluster=k8s \
            --user=github \
            --namespace=backend

          kubectl config use-context prod

          echo "Testing access..."
          kubectl auth can-i get pods -n backend || true
          kubectl auth can-i list secrets -n backend || true

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Verify Helm
        run: helm version

      - name: Deploy Helm chart
        run: |
          helm upgrade --install ${{ inputs.service-name }} \
            manifest-repo/charts/${{ inputs.service-name }} \
            -n backend

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/${{ inputs.service-name }} -n backend