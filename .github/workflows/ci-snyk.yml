name: "CI | Dependency Build & Snyk Scan"

# ──────────────────────────────────────────────────────────────────────────────
# Reusable workflow — called from a service's CI or from common-ci.yml
#
# Job graph:
#   prepare ──► snyk (install deps + security scan)
#
# Secrets required:
#   SNYK_TOKEN
# ──────────────────────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Path to the service root, e.g. services/account-service"
        required: true
        type: string
      service-name:
        description: "Human-readable service name used in log output"
        required: true
        type: string

    secrets:
      SNYK_TOKEN:
        required: true

jobs:

  # ── 1. PREPARE ───────────────────────────────────────────────────────────────
  # Installs npm dependencies and auto-syncs package-lock.json when needed.
  # ─────────────────────────────────────────────────────────────────────────────
  prepare:
    name: "Prepare"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles(format('{0}/package-lock.json', inputs.working_directory)) }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Auto-fix package-lock.json
        if: github.event_name == 'push'
        run: |
          if [ -n "$(git status --porcelain package-lock.json)" ]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add package-lock.json
            git commit -m "chore: auto-sync package-lock.json [skip ci]"
            git push
          else
            echo "Lockfile is fully synced."
          fi

  # ── 2. SNYK ──────────────────────────────────────────────────────────────────
  # Reinstalls dependencies in the runner, then scans the package.json
  # manifest with Snyk.  Fails on HIGH or CRITICAL severity findings.
  # ─────────────────────────────────────────────────────────────────────────────
  snyk:
    name: "Snyk Security Scan"
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore npm cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles(format('{0}/package-lock.json', inputs.working_directory)) }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        working-directory: ${{ inputs.working_directory }}
        run: npm ci || npm install

      - name: Snyk Scan
        uses: snyk/actions/node@0.4.0
        with:
          command: test
          args: --file=${{ inputs.working_directory }}/package.json --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
