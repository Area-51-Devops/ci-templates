name: Manual_CD

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
      ci-workflow-name:
        required: true
        type: string
        description: "Must match the 'name:' field of the triggering CI workflow"

    secrets:
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true
      MANIFEST_REPO:
        required: true
      CLUSTER_URL:
        required: true
      K8S_CA_CERT:
        required: true
      K8S_TOKEN:
        required: true   # IMPORTANT (needed for kubectl auth)

jobs:
  update-manifest:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      # ── Checkout app repo ───────────────────────────────────────────────
      - name: Checkout application repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Get latest git tag ──────────────────────────────────────────────
      - name: Get latest git tag
        id: get_tag
        run: |
          git fetch --tags
          TAG=$(git describe --tags --abbrev=0)
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      # ── GitHub App Token (correct usage) ────────────────────────────────
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: k8s-manifests

      # ── Checkout manifest repo ───────────────────────────────────────────
      - name: Checkout manifest repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.MANIFEST_REPO }}
          token: ${{ steps.app-token.outputs.token }}
          path: manifest-repo

      # ── Setup kubectl (NO manual install) ───────────────────────────────
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      # ── Setup Helm (NO manual install) ──────────────────────────────────
      - name: Setup Helm
        uses: azure/setup-helm@v4

      # ── Setup yq (NO manual install) ────────────────────────────────────
      - name: Setup yq
        uses: mikefarah/yq@v4.44.3

      # ── Update Helm values ──────────────────────────────────────────────
      - name: Update image tag in values.yaml
        run: |
          TAG=${{ steps.get_tag.outputs.tag }}
          FILE="manifest-repo/charts/${{ inputs.service-name }}/values.yaml"

          yq e ".image.tag = \"${TAG}\"" -i "${FILE}"

      # ── Commit changes ──────────────────────────────────────────────────
      - name: Commit and push
        run: |
          TAG=${{ steps.get_tag.outputs.tag }}

          cd manifest-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add charts/${{ inputs.service-name }}/values.yaml

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "chore(${{ inputs.service-name }}): bump image tag to ${TAG} [skip ci]"
          git push

      # ── Configure kubectl (clean + correct) ─────────────────────────────
      - name: Configure kubectl
        run: |
          echo "${{ secrets.K8S_CA_CERT }}" | base64 -d > ca.crt

          kubectl config set-cluster k8scli \
            --server=${{ secrets.CLUSTER_URL }} \
            --certificate-authority=ca.crt

          kubectl config set-credentials github \
            --token=${{ secrets.K8S_TOKEN }}

          kubectl config set-context prod \
            --cluster=k8scli \
            --user=github \
            --namespace=backend

          kubectl config use-context prod

      # ── Deploy Helm chart ───────────────────────────────────────────────
      - name: Deploy Helm chart
        run: |
          helm upgrade --install ${{ inputs.service-name }} \
            manifest-repo/charts/${{ inputs.service-name }} \
            -n backend

      # ── Verify rollout ──────────────────────────────────────────────────
      - name: Verify rollout
        run: |
          kubectl rollout status deployment/${{ inputs.service-name }} -n backend