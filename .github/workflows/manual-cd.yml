name: Manual_CD

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
      ci-workflow-name:
        required: true
        type: string
        description: "Must match the 'name:' field of the triggering CI workflow"

    secrets:
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true
      MANIFEST_REPO:
        required: true
      CLUSTER_URL:
        required: true
      K8S_CA_CERT:
        required: true

jobs:
  update-manifest:
    name: "CD – Update Helm image tag"
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout application repo (for version file)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Resolve the semver tag that CI just created ──────────────────────
      - name: Get latest git tag (semver)
        id: get_tag
        run: |
          git fetch --tags
          TAG=$(git describe --tags --abbrev=0)
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Resolved image tag: ${TAG}"

      # ── Generate GitHub App Token ────────────────────────────────────────
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: "k8s-manifests"

      # ── Checkout the manifest/helm repository ────────────────────────────
      - name: Checkout manifest repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.MANIFEST_REPO }}
          token: ${{ steps.app-token.outputs.token }}
          path: manifest-repo

      # ── Patch values.yaml with the new image tag ─────────────────────────
      - name: Update image tag in values.yaml
        run: |
          TAG=${{ steps.get_tag.outputs.tag }}
          VALUES_FILE="manifest-repo/charts/${{ inputs.service-name }}/values.yaml"

          yq e ".image.tag = \"${TAG}\"" -i "${VALUES_FILE}"

          echo "Updated image.tag to ${TAG} in ${VALUES_FILE}"
          cat "${VALUES_FILE}"

      # ── Commit & push the tag bump ────────────────────────────────────────
      - name: Commit and push to manifest repo
        run: |
          TAG=${{ steps.get_tag.outputs.tag }}

          cd manifest-repo
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add charts/${{ inputs.service-name }}/values.yaml
          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "chore(${{ inputs.service-name }}): bump image tag to ${TAG} [skip ci]"
          git push

      # ── Get GitHub OIDC token ────────────────────────────────────────────
      - name: Get GitHub OIDC token
        run: |
          TOKEN=$(curl -s \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com" \
            | jq -r '.value')

          echo "TOKEN=$TOKEN" >> $GITHUB_ENV

      # ── Configure kubectl dynamically ────────────────────────────────────
      - name: Configure kubectl
        run: |
          echo "${{ secrets.K8S_CA_CERT }}" | base64 -d > ca.crt

          kubectl config set-cluster k8scli \
            --server=${{ secrets.CLUSTER_URL }} \
            --certificate-authority=ca.crt

          kubectl config set-credentials github \
            --token=$TOKEN

          kubectl config set-context prod \
            --cluster=k8scli \
            --user=github \
            --namespace=backend

          kubectl config use-context prod

      # ── Deploy updated Helm chart ────────────────────────────────────────
      - name: Deploy Helm chart
        run: |
          helm upgrade --install ${{ inputs.service-name }} \
            manifest-repo/charts/${{ inputs.service-name }} \
            -n backend

      # ── Verify deployment ────────────────────────────────────────────────
      - name: Verify rollout
        run: |
          kubectl rollout status deployment/${{ inputs.service-name }} -n backend
