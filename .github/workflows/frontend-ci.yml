name: Common_CI

on:
  workflow_call:
    inputs:
      working_directory:
        required: true
        type: string

      image_name:
        required: true
        type: string

      run_build:
        required: false
        type: boolean
        default: false

      sonar_project_key:
        required: true
        type: string

      docker_context:
        required: false
        type: string
        default: services

      dockerfile_path:
        required: false
        type: string
        default: ''

    secrets:
      SONAR_TOKEN:
        required: true
      SONAR_HOST_URL:
        required: true
      SNYK_TOKEN:
        required: true
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      SMTP_HOST:
        required: true
      SMTP_PORT:
        required: true
      SMTP_USERNAME:
        required: true
      SMTP_PASSWORD:
        required: true
      EMAIL_TO:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: ${{ inputs.working_directory }}/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles(format('{0}/package-lock.json', inputs.working_directory)) }}

      # -------- SONAR --------
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: ${{ inputs.working_directory }}
          args: >
            -Dsonar.projectKey=${{ inputs.sonar_project_key }}
            -Dsonar.projectName=${{ inputs.sonar_project_key }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        continue-on-error: true
        with:
          scanMetadataReportFile: ${{ inputs.working_directory }}/.scannerwork/report-task.txt
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Install dependencies
        run: npm ci || npm install

      # -------- SNYK --------
      - name: Snyk Scan
        uses: snyk/actions/node@master
        with:
          command: test
          args: --file=${{ inputs.working_directory }}/package.json --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # -------- BUILD --------
      - name: Build
        if: inputs.run_build == true
        run: npm run build || echo "No build step"

      # -------- DOCKER BUILD --------
      - name: Build Docker Image
        working-directory: ${{ inputs.docker_context }}
        run: |
          docker build \
            -f ${{ inputs.dockerfile_path || format('{0}/Dockerfile', inputs.image_name) }} \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:v1 \
            .

      # -------- TRIVY --------
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:v1
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL

      # -------- PUSH --------
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:v1

      # -------- EMAIL NOTIFICATION --------
      - name: Send Email (Success)
        if: success() && github.ref == 'refs/heads/main'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CI Success - ${{ inputs.image_name }}"
          body: |
            Build Successful
            Image: ${{ inputs.image_name }}
            Workflow: ${{ github.workflow }}
            Repo: ${{ github.repository }}
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions

      - name: Send Email (Failure)
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CI Failed - ${{ inputs.image_name }} - Run #${{ github.run_number }}"
          body: |
            CI Pipeline Execution Failed

            Service: ${{ inputs.image_name }}
            Repository: ${{ github.repository }}
            Workflow: ${{ github.workflow }}

            Event Type: ${{ github.event_name }}
            Branch: ${{ github.ref_name }}
            Triggered By: ${{ github.actor }}

            Logs:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions