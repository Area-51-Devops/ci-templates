name: "CI | SonarQube Scan & Quality Gate"

# ──────────────────────────────────────────────────────────────────────────────
# Reusable workflow — called from a service's CI or from common-ci.yml
#
# Job graph:
#   prepare ──► test ──► sonar (scan + quality-gate)
#
# Secrets required:
#   SONAR_TOKEN, SONAR_HOST_URL
# ──────────────────────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Path to the service root, e.g. services/account-service"
        required: true
        type: string
      sonar_project_key:
        description: "SonarQube project key / name"
        required: false
        type: string
        default: 'NexusBank'
      service-name:
        description: "Human-readable service name used in log output"
        required: true
        type: string

    secrets:
      SONAR_TOKEN:
        required: true
      SONAR_HOST_URL:
        required: true

jobs:

  # ── 1. PREPARE ───────────────────────────────────────────────────────────────
  # Installs npm dependencies and auto-syncs package-lock.json when needed.
  # ─────────────────────────────────────────────────────────────────────────────
  prepare:
    name: "Prepare"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles(format('{0}/package-lock.json', inputs.working_directory)) }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Auto-fix package-lock.json
        if: github.event_name == 'push'
        run: |
          if [ -n "$(git status --porcelain package-lock.json)" ]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add package-lock.json
            git commit -m "chore: auto-sync package-lock.json [skip ci]"
            git push
          else
            echo "Lockfile is fully synced."
          fi

  # ── 2. TEST ──────────────────────────────────────────────────────────────────
  # Runs unit tests — must pass before code is sent to SonarQube.
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: "Test"
    runs-on: ubuntu-latest
    needs: prepare

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore npm cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles(format('{0}/package-lock.json', inputs.working_directory)) }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run Tests
        run: npm test

  # ── 3. SONAR ─────────────────────────────────────────────────────────────────
  # Scans code with SonarQube then waits for the quality gate result.
  # Job fails if the quality gate status is not "OK".
  # ─────────────────────────────────────────────────────────────────────────────
  sonar:
    name: "SonarQube Scan & Quality Gate"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectKey=${{ inputs.sonar_project_key }}
            -Dsonar.projectName=${{ inputs.sonar_project_key }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        with:
          scanMetadataReportFile: .scannerwork/report-task.txt
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
