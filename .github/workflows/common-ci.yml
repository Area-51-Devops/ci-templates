name: Common_CI

# ──────────────────────────────────────────────────────────────────────────────
# Orchestrator — services call this file exactly as before.
# Internally it delegates to three focused reusable workflows:
#
#   ci-sonar.yml  →  prepare · test · sonar + quality gate
#   ci-snyk.yml   →  prepare · snyk security scan
#   ci-image.yml  →  prepare · build · trivy · push · notify
#
# Execution order:
#
#   ci-sonar ──┐
#              ├──► ci-image  (only starts when BOTH quality gates pass)
#   ci-snyk  ──┘
#
# ──────────────────────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:
      working_directory:
        required: true
        type: string
      image_name:
        required: true
        type: string
      run_build:
        required: false
        type: boolean
        default: false
      sonar_project_key:
        required: false
        type: string
        default: 'NexusBank'
      docker_context:
        required: false
        type: string
        default: 'services'
      dockerfile_path:
        required: false
        type: string
        default: ''
      service-name:
        required: true
        type: string

    secrets:
      SONAR_TOKEN:
        required: true
      SONAR_HOST_URL:
        required: true
      SNYK_TOKEN:
        required: true
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      SMTP_HOST:
        required: true
      SMTP_PORT:
        required: true
      SMTP_USERNAME:
        required: true
      SMTP_PASSWORD:
        required: true
      EMAIL_TO:
        required: true

jobs:

  # ── Stage 1a: SonarQube Scan + Quality Gate ───────────────────────────────
  ci-sonar:
    uses: Area-51-Devops/ci-templates/.github/workflows/ci-sonar.yml@main
    with:
      working_directory: ${{ inputs.working_directory }}
      sonar_project_key: ${{ inputs.sonar_project_key }}
      service-name: ${{ inputs.service-name }}
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ── Stage 1b: Dependency Build + Snyk Scan ───────────────────────────────
  ci-snyk:
    uses: Area-51-Devops/ci-templates/.github/workflows/ci-snyk.yml@main
    with:
      working_directory: ${{ inputs.working_directory }}
      service-name: ${{ inputs.service-name }}
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # ── Stage 2: Build Image · Trivy Scan · Push · Notify ────────────────────
  # Only starts once BOTH ci-sonar and ci-snyk have passed.
  ci-image:
    needs: [ci-sonar, ci-snyk]
    uses: Area-51-Devops/ci-templates/.github/workflows/ci-image.yml@main
    with:
      working_directory: ${{ inputs.working_directory }}
      image_name: ${{ inputs.image_name }}
      run_build: ${{ inputs.run_build }}
      docker_context: ${{ inputs.docker_context }}
      dockerfile_path: ${{ inputs.dockerfile_path }}
      service-name: ${{ inputs.service-name }}
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
