name: "CI | Build Image, Trivy Scan & Push"

# ──────────────────────────────────────────────────────────────────────────────
# Reusable workflow — called from a service's CI or from common-ci.yml
# ──────────────────────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Path to the service root, e.g. services/account-service"
        required: true
        type: string
      image_name:
        description: "Docker image name used for identification"
        required: true
        type: string
      run_build:
        description: "Set true for services that need an npm build step before Docker"
        required: false
        type: boolean
        default: false
      docker_context:
        description: "Docker build context directory"
        required: false
        type: string
        default: 'services'
      dockerfile_path:
        description: "Explicit path to Dockerfile; defaults to <image_name>/Dockerfile"
        required: false
        type: string
        default: ''
      service-name:
        description: "Human-readable service name for tags and artifacts"
        required: true
        type: string
      gate_environment:
        description: "GitHub environment name for manual approval (empty to skip)"
        required: false
        type: string
        default: ''

    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      SMTP_HOST:
        required: true
      SMTP_PORT:
        required: true
      SMTP_USERNAME:
        required: true
      SMTP_PASSWORD:
        required: true
      EMAIL_TO:
        required: true

jobs:

  # ── 1. PREPARE ───────────────────────────────────────────────────────────────
  prepare:
    name: "Prepare"
    runs-on: ubuntu-latest
    outputs:
      tag:  ${{ steps.image_tag.outputs.tag }}
      push: ${{ steps.image_tag.outputs.push }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate Semantic Version (main only)
        id: semver
        if: github.ref == 'refs/heads/main'
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ github.token }}
          dry_run: true
          default_bump: patch
          tag_prefix: 'v'

      - name: Resolve Image Tag
        id: image_tag
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "tag=${{ steps.semver.outputs.new_tag }}" >> $GITHUB_OUTPUT
            echo "push=true"                               >> $GITHUB_OUTPUT
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "tag=sha-${SHORT_SHA}"                    >> $GITHUB_OUTPUT
            echo "push=false"                              >> $GITHUB_OUTPUT
          fi

  # ── 2. BUILD ─────────────────────────────────────────────────────────────────
  build:
    name: "Docker Build"
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (frontend builds only)
        if: inputs.run_build == true
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ inputs.working_directory }}/package-lock.json

      - name: Build Assets
        if: inputs.run_build == true
        working-directory: ${{ inputs.working_directory }}
        run: |
          npm ci
          npm run build

      - name: Resolve Dockerfile Path
        id: dockerfile
        run: |
          DOCKERFILE="${{ inputs.dockerfile_path }}"
          if [ -z "$DOCKERFILE" ]; then
            DOCKERFILE="${{ inputs.image_name }}/Dockerfile"
          fi
          echo "path=$DOCKERFILE" >> $GITHUB_OUTPUT

      - name: Build Docker Image
        working-directory: ${{ inputs.docker_context }}
        run: |
          docker build \
            -f "${{ steps.dockerfile.outputs.path }}" \
            -t ${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}:${{ needs.prepare.outputs.tag }} \
            .

      - name: Save image as tar artifact
        run: |
          docker save ${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}:${{ needs.prepare.outputs.tag }} \
            -o /tmp/docker-image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ inputs.service-name }}
          path: /tmp/docker-image.tar
          retention-days: 1

  # ── 3. TRIVY ─────────────────────────────────────────────────────────────────
  trivy:
    name: "Trivy Image Scan"
    runs-on: ubuntu-latest
    needs: [prepare, build]
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ inputs.service-name }}
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/docker-image.tar

      - name: Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}:${{ needs.prepare.outputs.tag }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'

  # ── 4. PROD GATE ──────────────────────────────────────────────────────────────
  prod-gate:
    name: "Prod Gate"
    runs-on: ubuntu-latest
    needs: [prepare, trivy]
    if: |
      needs.prepare.outputs.push == 'true' && 
      inputs.gate_environment != ''
    environment: ${{ inputs.gate_environment }}
    steps:
      - name: Approval Check
        run: echo "Manual approval received for ${{ inputs.service-name }}."

  # ── 5. PUSH ──────────────────────────────────────────────────────────────────
  push:
    name: "Docker Push"
    runs-on: ubuntu-latest
    needs: [prepare, build, trivy, prod-gate]
    # This logic ensures push runs if:
    # 1. We are on main branch (push output is true)
    # 2. IF a gate was required, it succeeded. IF no gate was required, it was skipped.
    if: |
      always() &&
      needs.prepare.outputs.push == 'true' &&
      (needs.prod-gate.result == 'success' || needs.prod-gate.result == 'skipped') &&
      needs.trivy.result == 'success'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ inputs.service-name }}
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/docker-image.tar

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image (semver + latest)
        run: |
          FULL_IMAGE_NAME="${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}"
          TAG="${{ needs.prepare.outputs.tag }}"
          
          docker push $FULL_IMAGE_NAME:$TAG
          docker tag  $FULL_IMAGE_NAME:$TAG $FULL_IMAGE_NAME:latest
          docker push $FULL_IMAGE_NAME:latest

      - name: Create Git Tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ github.token }}
          custom_tag: ${{ needs.prepare.outputs.tag }}
          tag_prefix: ''

  # ── 6. NOTIFY ────────────────────────────────────────────────────────────────
  notify:
    name: "Notify"
    runs-on: ubuntu-latest
    needs: [prepare, build, trivy, prod-gate, push]
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CI ${{ contains(needs.*.result, 'failure') && 'Failed' || 'Success' }} - ${{ inputs.service-name }}"
          body: |
            Pipeline Summary for ${{ inputs.service-name }}
            
            Result:        ${{ contains(needs.*.result, 'failure') && 'FAILED' || 'SUCCESS' }}
            Tag:           ${{ needs.prepare.outputs.tag }}
            Triggered By:  ${{ github.actor }}
            Log Link:      ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            Job Statuses:
            - Prepare:     ${{ needs.prepare.result }}
            - Build:       ${{ needs.build.result }}
            - Trivy:       ${{ needs.trivy.result }}
            - Push:        ${{ needs.push.result }}
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions
